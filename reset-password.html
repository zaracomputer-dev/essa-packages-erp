<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password | Eissa Packages POS</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <section class="login-screen">
    <form id="resetPasswordForm" class="login-card">
      <h1>Reset Password</h1>
      <p id="resetStatus">Enter a new password for your Eissa Packages POS cloud account.</p>
      <label>New password<input name="password" type="password" autocomplete="new-password" minlength="6" required></label>
      <label>Confirm password<input name="confirmPassword" type="password" autocomplete="new-password" minlength="6" required></label>
      <button type="submit">Update password</button>
      <a class="link-button" href="/">Back to login</a>
    </form>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/.netlify/functions/supabase-config"></script>
  <script src="supabase-config.js"></script>
  <script src="reset-password.js"></script>
</body>
</html>
